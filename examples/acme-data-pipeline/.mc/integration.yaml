version: 1
package: "@acme/data-pipeline"
domain: data-pipeline
subdomain: etl

job_types:
  - path: "job-types/*.yaml"
workflows:
  - path: "workflows/*.yaml"
agents:
  - path: "agents/*.yaml"

providers:
  allowed: [local-process]
  default: local-process

llm_providers:
  allowed: [ollama-local, ollama-cloud]
  default: ollama-local
