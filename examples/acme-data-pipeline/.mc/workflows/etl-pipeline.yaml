stages:
  - id: extract
    type: extract
    description: Extract data from source
    depends_on: []
  - id: transform
    type: transform
    description: Transform dataset
    depends_on: [extract]
  - id: validate
    type: validate
    description: Validate schema
    depends_on: [transform]
  - id: load
    type: load
    description: Load into warehouse
    depends_on: [validate]