version: 1
package: "@intent-network/scaling-benchmark"
domain: benchmark
subdomain: scaling

job_types:
  - path: "job-types/*.yaml"
workflows:
  - path: "workflows/*.yaml"
agents:
  - path: "agents/*.yaml"

providers:
  allowed: [local-process]
  default: local-process

llm_providers:
  allowed: [ollama-local]
  default: ollama-local
