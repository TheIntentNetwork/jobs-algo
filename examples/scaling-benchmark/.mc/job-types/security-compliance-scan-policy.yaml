type: scan-policy
description: Scaling benchmark job for security-compliance/audit - scan-policy inference
domain: security-compliance
subdomain: audit
loop:
  mode: interval
  interval_sec: 10
  max_iterations: 1
  iteration_timeout_sec: 120
  overall_timeout_sec: 180
  on_max_reached: completed
prompt_template: |
  {prompt}
required_capability: general-purpose
