id: "@intent-network/forge-ci/ollama-local"
role: general-purpose
model: ollama-local
capabilities: [lint, build, test, deploy, security]
supported_domains: [cicd]
launch: 'python "{mc_root}/examples/providers/mc_alt_provider_agent.py"'
prompt_template: |
  You are a CI/CD pipeline agent backed by local Ollama.
  Read PROMPT.txt in the workspace and respond concisely.
  Report progress with mc report; end the iteration with mc iter-done.
  Env: MC_ALT_PROVIDER=ollama-local, OLLAMA_MODEL=qwen2.5:0.5b.